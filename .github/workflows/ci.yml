name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'dsp-parent/**'
      - 'dsp-admin-web/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dsp_config
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Initialize database
        run: mysql -h 127.0.0.1 -u root -proot dsp_config < dsp-parent/dsp-core/src/main/resources/db/init.sql

      - name: Build backend
        run: mvn clean compile -f dsp-parent/pom.xml

      - name: Run tests
        run: mvn test -f dsp-parent/pom.xml
        env:
          DSP_DB_HOST: localhost
          DSP_DB_PORT: 3306
          DSP_DB_NAME: dsp_config
          DSP_DB_USERNAME: root
          DSP_DB_PASSWORD: root

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dsp-admin-web/package-lock.json

      - name: Install dependencies
        working-directory: dsp-admin-web
        run: npm install

      - name: Build
        working-directory: dsp-admin-web
        run: npm run build
