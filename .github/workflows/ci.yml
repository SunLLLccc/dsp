name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: dsp_config
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        run: mvn clean compile -f dsp-parent/pom.xml

      - name: Run tests
        run: mvn test -f dsp-parent/pom.xml
        env:
          DSP_DB_HOST: localhost
          DSP_DB_PORT: 3306
          DSP_DB_NAME: dsp_config
          DSP_DB_USERNAME: root
          DSP_DB_PASSWORD: root

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: dsp-admin-web
        run: npm install

      - name: Build
        working-directory: dsp-admin-web
        run: npm run build
