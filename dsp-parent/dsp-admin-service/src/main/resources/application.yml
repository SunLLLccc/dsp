server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: dsp-admin-service

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dsp?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      filter:
        stat:
          enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

dsp:
  jwt:
    secret: ${DSP_JWT_SECRET:dsp-platform-jwt-secret-key-must-be-at-least-32-characters-long-for-security}
    expiration-hours: ${DSP_JWT_EXPIRATION_HOURS:24}
  timestamp-tolerance-minutes: 5
  security:
    encrypt-key: ${DSP_ENCRYPT_KEY:DSP2026SecretKey4}
  admin:
    username: ${DSP_ADMIN_USERNAME:admin}
    password: ${DSP_ADMIN_PASSWORD:admin123}
  export:
    base-dir: ./export-files
    online-max-rows: 100000
    chunk-size: 10000

logging:
  level:
    com.fintechervision.dsp: debug
