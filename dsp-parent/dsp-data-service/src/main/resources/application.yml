server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: dsp-data-service

  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${DSP_DB_HOST:localhost}:${DSP_DB_PORT:3306}/${DSP_DB_NAME:dsp_config}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
          username: ${DSP_DB_USERNAME:root}
          password: ${DSP_DB_PASSWORD:root}
      druid:
        initial-size: 5
        min-idle: 5
        max-active: 20
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        validation-query: SELECT 1
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
      filter:
        stat:
          enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*

  redis:
    host: ${DSP_REDIS_HOST:localhost}
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

  # MongoDB配置（需要使用mongo查询类型时启用）
  data:
    mongodb:
      uri: ${DSP_MONGO_URI:mongodb://localhost:27017/dsp}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

dsp:
  jwt:
    secret: ${DSP_JWT_SECRET:dsp-platform-jwt-secret-key-must-be-at-least-32-characters-long-for-security}
    expiration-hours: ${DSP_JWT_EXPIRATION_HOURS:24}
  timestamp-tolerance-minutes: 5
  security:
    encrypt-key: ${DSP_ENCRYPT_KEY:DSP2026SecretKey4}
  cache:
    xml:
      refresh-enabled: true
      refresh-interval: 300000
      load-templates: false
      template-path: template
  export:
    base-dir: ./export-files
    online-max-rows: 100000
    chunk-size: 10000

logging:
  level:
    com.sunlc.dsp: debug
