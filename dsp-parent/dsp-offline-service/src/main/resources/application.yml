server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: dsp-offline-service

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dsp?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

dsp:
  jwt:
    secret: dsp-platform-jwt-secret-key-must-be-at-least-32-characters-long-for-security
    expiration-hours: 24
  export:
    base-dir: ./export-files
    online-max-rows: 100000
    chunk-size: 10000

logging:
  level:
    com.fintechervision.dsp: debug
