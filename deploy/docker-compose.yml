services:
  data-service:
    build:
      context: .
      dockerfile: Dockerfile.java
      args:
        JAR_FILE: jars/dsp-data-service.jar
        PORT: "8080"
    ports:
      - "8080:8080"
    env_file: .env
    restart: unless-stopped

  admin-service:
    build:
      context: .
      dockerfile: Dockerfile.java
      args:
        JAR_FILE: jars/dsp-admin-service.jar
        PORT: "8082"
    ports:
      - "8082:8082"
    env_file: .env
    restart: unless-stopped

  offline-service:
    build:
      context: .
      dockerfile: Dockerfile.java
      args:
        JAR_FILE: jars/dsp-offline-service.jar
        PORT: "8081"
    ports:
      - "8081:8081"
    env_file: .env
    restart: unless-stopped

  admin-web:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      - admin-service
      - data-service
      - offline-service
    restart: unless-stopped
