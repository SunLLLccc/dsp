services:
  data-service:
    build:
      context: .
      dockerfile: Dockerfile.java
      args:
        JAR_FILE: jars/dsp-data-service.jar
        PORT: "8080"
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    restart: unless-stopped

  admin-service:
    build:
      context: .
      dockerfile: Dockerfile.java
      args:
        JAR_FILE: jars/dsp-admin-service.jar
        PORT: "8082"
    expose:
      - "8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    restart: unless-stopped

  offline-service:
    build:
      context: .
      dockerfile: Dockerfile.java
      args:
        JAR_FILE: jars/dsp-offline-service.jar
        PORT: "8081"
    expose:
      - "8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    restart: unless-stopped

  admin-web:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - admin-service
      - data-service
      - offline-service
    restart: unless-stopped
